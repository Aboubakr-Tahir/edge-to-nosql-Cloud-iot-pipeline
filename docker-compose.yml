services:
  
  nifi:
    image: apache/nifi:1.23.2
    container_name: nifi-bridge
    ports:
      - "8080:8080"
      - "9999:9999"
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=supersecretpassword123
    volumes:
      - nifi-data:/opt/nifi/nifi-current/conf
    networks:
      - iot_network

  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,ANYWHERE:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,ANYWHERE://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,ANYWHERE://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - iot_network

  
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-db
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=IoTCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./cassandra/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - iot_network

  
  python-consumer:
    build:
      context: .
      dockerfile: processors/Dockerfile
    container_name: python-consumer
    depends_on:
      - kafka
      - cassandra
    networks:
      - iot_network
    restart: always

  live-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: streamlit-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - kafka
    networks:
      - iot_network
    restart: always

networks:
  iot_network:
    driver: bridge

volumes:
  nifi-data:
  kafka-data:
  cassandra-data: